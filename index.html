<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um perfil para começar a assistir na Netflix">
    <meta name="theme-color" content="#000000">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Alternar entre tema claro e escuro">Modo claro</button>
    <main>
        <section class="profile-selection">
            <h1>Quem está assistindo?</h1>
            <ul class="profiles" role="list">
                <li class="profile-item" role="listitem">
                    <a href="catalogo/catalogo.html">
                        <article class="profile">
                            <figure>
                                <img src="Netlura/assets/PERFIL_1.png" alt="Ilustração em estilo pop art de um homem com óculos redondos, cabelos espetados e efeito de retícula, nas cores roxo e laranja">
                                <figcaption>Gustavo</figcaption>
                            </figure>
                        </article>
                    </a>
                </li>
                <li class="profile-item" role="listitem">
                    <a href="catalogo/catalogo.html">
                        <article class="profile">
                            <figure>
                                <img src="/assets/PERFIL_2.png" alt="Ilustração em estilo pop art de uma mulher com óculos de sol hexagonais, cabelo bob e gola alta, nas cores verde e cerceta">
                                <figcaption>Ana</figcaption>
                            </figure>
                        </article>
                    </a>
                </li>
                <li class="profile-item" role="listitem">
                    <a href="catalogo/catalogo.html">
                        <article class="profile">
                            <figure>
                                <img src="/assets/PERFIL_3.png" alt="Ilustração em arte pop de uma mulher negra com cabelos curtos e cacheados, vestindo camisa amarela sobre fundo rosa">
                                <figcaption>Debora</figcaption>
                            </figure>
                        </article>
                    </a>
                </li>
                <li class="profile-item" role="listitem">
                    <a href="catalogo/catalogo.html">
                        <article class="profile">
                            <figure>
                                <img src="/assets/PERFIL_4.png" alt="Ilustração em arte pop de um homem asiático mais velho, com barba grisalha e cabelo encaracolado, vestindo camisa verde sobre fundo azul-escuro">
                                <figcaption>Gerson</figcaption>
                            </figure>
                        </article>
                    </a>
                </li>
            </ul>
        </section>
    </main>
    <script src="js/index.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
